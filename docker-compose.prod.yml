services:
  redis:
    image: redis:7-alpine
    container_name: importacao-redis
    restart: unless-stopped
    # Redis only accessible internally (no host port exposure)
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  postgres:
    image: postgres:16-alpine
    container_name: importacao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "127.0.0.1:5450:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: importacao-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3050:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      API_PORT: 3001
      NODE_ENV: production
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      GOOGLE_DRIVE_CLIENT_EMAIL: ${GOOGLE_DRIVE_CLIENT_EMAIL:-}
      GOOGLE_DRIVE_PRIVATE_KEY: ${GOOGLE_DRIVE_PRIVATE_KEY:-}
      GOOGLE_DRIVE_ROOT_FOLDER_ID: ${GOOGLE_DRIVE_ROOT_FOLDER_ID:-}
      GOOGLE_CHAT_WEBHOOK_URL: ${GOOGLE_CHAT_WEBHOOK_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      GMAIL_SHARED_MAILBOX: ${GMAIL_SHARED_MAILBOX:-}
      EMAIL_INGESTION_ENABLED: ${EMAIL_INGESTION_ENABLED:-false}
      EMAIL_ALLOWED_SENDERS: ${EMAIL_ALLOWED_SENDERS:-}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASS: ${IMAP_PASS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ALLOWED_DOMAIN: ${ALLOWED_DOMAIN:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      ODOO_URL: ${ODOO_URL:-}
      ODOO_DB: ${ODOO_DB:-}
      ODOO_USER: ${ODOO_USER:-}
      ODOO_PASSWORD: ${ODOO_PASSWORD:-}
      GOOGLE_ADMIN_EMAIL: ${GOOGLE_ADMIN_EMAIL:-}
      GOOGLE_GROUP_ALLOWED: ${GOOGLE_GROUP_ALLOWED:-}
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    security_opt:
      - no-new-privileges:true

  cert-api:
    build:
      context: ./apps/cert-api
      dockerfile: Dockerfile
    container_name: importacao-cert-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      GOOGLE_SHEETS_CLIENT_EMAIL: ${GOOGLE_DRIVE_CLIENT_EMAIL:-}
      GOOGLE_SHEETS_PRIVATE_KEY: ${GOOGLE_DRIVE_PRIVATE_KEY:-}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID:-1qcgcj9814UFikhurgvsTTcUxvPF2r3w_QY_EurvBtSE}
      WMS_ORACLE_HOST: ${WMS_ORACLE_HOST:-192.168.168.10}
      WMS_ORACLE_PORT: ${WMS_ORACLE_PORT:-1521}
      WMS_ORACLE_SID: ${WMS_ORACLE_SID:-WMS}
      WMS_ORACLE_USER: ${WMS_ORACLE_USER:-wisweb}
      WMS_ORACLE_PASS: ${WMS_ORACLE_PASS:-wisweb}
      ERP_PUKET_HOST: ${ERP_PUKET_HOST:-db01.grupounico.com}
      ERP_PUKET_DB: ${ERP_PUKET_DB:-DB_puket}
      ERP_IMG_HOST: ${ERP_IMG_HOST:-db02.grupounico.com}
      ERP_IMG_DB: ${ERP_IMG_DB:-Grupo_Imaginarium}
      ERP_MSSQL_USER: ${ERP_MSSQL_USER}
      ERP_MSSQL_PASS: ${ERP_MSSQL_PASS}
      CERT_API_KEY: ${CERT_API_KEY:?CERT_API_KEY is required}
    volumes:
      - cert-reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: importacao-web
    restart: unless-stopped
    ports:
      - "8085:80"
    depends_on:
      api:
        condition: service_healthy
      cert-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    security_opt:
      - no-new-privileges:true

  certbot:
    image: certbot/certbot
    container_name: importacao-certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # Initial issuance: docker compose -f docker-compose.prod.yml run --rm certbot certonly ...
    # Renewal: use scripts/renew-certs.sh via cron (twice daily)
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $$!; done"
    depends_on:
      - web

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: importacao-prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  grafana:
    image: grafana/grafana:11.2.2
    container_name: importacao-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3030:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3030}
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  pgdata:
  redisdata:
  uploads:
  cert-reports:
  prometheusdata:
  grafanadata:
