version: 2

updates:
  # Root npm workspace
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      dev-deps:
        patterns: ["eslint*", "prettier*", "typescript*", "@types/*"]

  # API npm workspace
  - package-ecosystem: npm
    directory: "/apps/api"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10

  # Web npm workspace
  - package-ecosystem: npm
    directory: "/apps/web"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10

  # Python cert-api
  - package-ecosystem: pip
    directory: "/apps/cert-api"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5

  # Docker base images
  - package-ecosystem: docker
    directory: "/apps/api"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"

  - package-ecosystem: docker
    directory: "/apps/web"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"

  - package-ecosystem: docker
    directory: "/apps/cert-api"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
