name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-api:
    name: Lint & Typecheck API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck API
        run: npx -w apps/api tsc --noEmit
      - name: Lint API
        run: npx -w apps/api eslint src --max-warnings=0 || true

  lint-web:
    name: Lint & Typecheck Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck Web
        run: npx -w apps/web tsc --noEmit
      - name: Lint Web
        run: npx -w apps/web eslint src --max-warnings=0 || true

  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check apps/cert-api/

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: importacao_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run API tests
        run: npm test -w apps/api -- --coverage
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/importacao_test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 7

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run Web tests
        run: npm test -w apps/web --if-present

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pytest pytest-cov -r apps/cert-api/requirements.txt || true
      - name: Run pytest
        run: pytest apps/cert-api/ --tb=short -q || true

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: npm audit (blocking on high/critical)
        run: npm audit --audit-level=high

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-api, lint-web, test-api, security-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: ./apps/api
          push: false
          tags: importacao-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker
      - name: Build Web image
        uses: docker/build-push-action@v7
        with:
          context: ./apps/web
          push: false
          tags: importacao-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker
      - name: Trivy scan - API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: importacao-api:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
      - name: Trivy scan - Web image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: importacao-web:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
      - name: SBOM - API (syft)
        uses: anchore/sbom-action@v0
        with:
          image: importacao-api:ci
          artifact-name: sbom-api.spdx.json
          output-file: sbom-api.spdx.json
      - name: SBOM - Web (syft)
        uses: anchore/sbom-action@v0
        with:
          image: importacao-web:ci
          artifact-name: sbom-web.spdx.json
          output-file: sbom-web.spdx.json
