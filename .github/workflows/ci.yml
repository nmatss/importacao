name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck API
        run: npx -w apps/api tsc --noEmit
      - name: Typecheck Web
        run: npx -w apps/web tsc --noEmit
      - name: Security audit
        run: npm audit --audit-level=high || true
      - name: Check formatting
        run: npx prettier --check "apps/**/*.{ts,tsx}" || true

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: importacao_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run API tests
        run: npm test -w apps/api -- --coverage
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/importacao_test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/api/coverage/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build API
        run: npm run build -w apps/api
      - name: Build Web
        run: npm run build -w apps/web
